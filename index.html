<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя страница</title>
    <link rel="icon" href="me.jpg" type="image/jpeg">
    
    <style>
        :root {
            --bg: #121212;
            --text: white;
            --card: #222;
            --border: #444;
            --accent: #50fa7b; /* Цвет индикатора и акцентов */
        }

        .light-theme {
            --bg: #f0f0f0;
            --text: #121212;
            --card: #fff;
            --border: #ccc;
            --accent: #007bff;
        }

        /* Индикатор прогресса */
        #progress-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: transparent;
            z-index: 9999;
        }
        #progress-bar {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.1s ease;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            padding: 40px 20px;
            transition: 0.3s;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .container { width: 100%; max-width: 600px; text-align: center; }
        
        /* Основной контейнер профиля (обновленный) */
        .profile-img-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 15px;
        }

        /* Стили самой фотографии (обновленные) */
        .profile-img { 
            width: 100%; 
            height: 100%; 
            /* По умолчанию заглушка или me.jpg, если он есть */
            background-image: url('me.jpg'), url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="gray"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>');
            background-size: cover; 
            background-position: center;
            border-radius: 50%; 
            border: 3px solid var(--border);
            cursor: pointer;
            overflow: hidden;
            transition: 0.3s ease;
            box-sizing: border-box;
        }

        /* Эффект наведения (показываем, что можно кликнуть) */
        .profile-img:hover {
            filter: brightness(0.8);
            border-color: var(--accent);
        }

        /* Иконка камеры, появляющаяся при наведении */
        .profile-img::after {
            content: '📷';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            color: white;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: 0.3s;
        }

        .profile-img:hover::after {
            opacity: 1;
        }

        /* Блок О себе */
        .about-section {
            margin: 20px 0 30px;
            line-height: 1.6;
            font-size: 16px;
            opacity: 0.9;
        }

        /* Стили кнопок-ссылок */
        .link-btn { 
            display: block; background: var(--card); color: var(--text); 
            text-decoration: none; padding: 18px; margin-bottom: 12px; 
            border-radius: 15px; font-size: 18px; font-weight: bold; 
            border: 2px solid var(--border); 
            transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
        }

        .link-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
            background: var(--border);
        }

        /* Сетка проектов */
        .projects
