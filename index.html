<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя страница</title>
    <link rel="icon" href="me.jpg" type="image/jpeg">
    
    <style>
        :root {
            --bg: #121212;
            --text: white;
            --card: #222;
            --border: #444;
            --accent: #50fa7b;
        }

        .light-theme {
            --bg: #f0f0f0;
            --text: #121212;
            --card: #fff;
            --border: #ccc;
            --accent: #007bff;
        }

        #progress-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: transparent;
            z-index: 9999;
        }
        #progress-bar {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.1s ease;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            padding: 40px 20px;
            transition: 0.3s;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .container { width: 100%; max-width: 600px; text-align: center; }
        
        /* ОБНОВЛЕННЫЕ СТИЛИ АВАТАРКИ */
        .profile-img { 
            width: 120px; 
            height: 120px; 
            background-image: url('me.jpg'); 
            background-size: cover; 
            background-position: center;
            border-radius: 50%; 
            margin: 0 auto 15px; 
            border: 3px solid var(--border);
            cursor: pointer; /* Показываем, что кликабельно */
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .profile-img:hover {
            filter: brightness(0.8);
            border-color: var(--accent);
        }

        /* Текст при наведении (опционально) */
        .profile-img::after {
            content: "Изм.";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0,0,0,0.5);
            color: white;
            font-size: 10px;
            padding: 2px 0;
            opacity: 0;
            transition: 0.3s;
        }

        .profile-img:hover::after {
            opacity: 1;
        }

        .about-section {
            margin: 20px 0 30px;
            line-height: 1.6;
            font-size: 16px;
            opacity: 0.9;
        }

        .link-btn { 
            display: block; background: var(--card); color: var(--text); 
            text-decoration: none; padding: 18px; margin-bottom: 12px; 
            border-radius: 15px; font-size: 18px; font-weight: bold; 
            border: 2px solid var(--border); 
            transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
        }

        .link-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
            background: var(--border);
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 40px;
            width: 100%;
        }

        .project-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 20px;
            text-align: left;
            transition: 0.3s;
        }

        .project-card:hover {
            border-color: var(--accent);
            transform: scale(1.02);
        }

        .project-card h3 { margin: 0 0 10px 0; font-size: 18px; }
        .project-card p { margin: 0; font-size: 14px; opacity: 0.8; }

        @media (max-width: 480px) {
            .container { max-width: 100%; }
            .theme-toggle { padding: 8px 12px; font-size: 14px; }
        }
    </style>
</head>
<body>

    <div id="progress-container">
        <div id="progress-bar"></div>
    </div>

    <button class="theme-toggle" onclick="toggleTheme()">🌓 Тема</button>

    <div class="container">
        <div class="profile-img" id="avatar" onclick="changeAvatar()"></div>
        <input type="file" id="fileInput" style="display: none;" accept="image/*" onchange="loadPhoto(event)">
        
        <h1 id="name">Ксюша</h1>
        
        <div class="about-section">
            <p>Добро пожаловать на мой сайт!</p>
        </div>

        <a href="https://t.me/Kikimoriza02" class="link-btn" onclick="vib(40)">Мой Telegram</a>
        <a href="https://vk.ru/id578113961" class="link-btn" onclick="vib(40)">Мой VK</a>

        <h2 style="margin-top: 50px;">Мои проекты</h2>
        <div class="projects-grid">
            <div class="project-card">
                <h3>Личный сайт</h3>
                <p>Этот самый сайт, который вы видите.</p>
            </div>
            <div class="project-card">
                <h3>В разработке</h3>
                <p>Скоро здесь будет что-то интересное.</p>
            </div>
        </div>
    </div>

<script>
    // Проверяем при загрузке, есть ли сохраненное фото
    window.onload = function() {
        const savedAvatar = localStorage.getItem('userAvatar');
        if (savedAvatar) {
            document.getElementById('avatar').style.backgroundImage = `url(${savedAvatar})`;
        }
    };

    function vib(ms) {
        if (navigator.vibrate) navigator.vibrate(ms);
    }

    function toggleTheme() {
        vib(60);
        document.body.classList.toggle('light-theme');
    }

    // ЛОГИКА СМЕНЫ ФОТО
    function changeAvatar() {
        vib(40);
        document.getElementById('fileInput').click();
    }

    function loadPhoto(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const imageData = e.target.result;
                // Меняем фон аватарки
                document.getElementById('avatar').style.backgroundImage = `url(${imageData})`;
                // Сохраняем в память браузера
                localStorage.setItem('userAvatar', imageData);
            };
            reader.readAsDataURL(file);
        }
    }

    window.onscroll = function() {
        let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
        let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        let scrolled = (winScroll / height) * 100;
        document.getElementById("progress-bar").style.width = scrolled + "%";
    };
</script>

</body>
</html>
