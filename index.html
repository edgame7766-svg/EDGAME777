<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Портфолио</title>
    <style>
        /* Переменные для темной темы (по умолчанию) */
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --text: #c9d1d9;
            --text-bright: #ffffff;
            --accent: #2f81f7;
            --border: #30363d;
        }

        /* Переменные для светлой темы */
        .light-theme {
            --bg: #ffffff;
            --card: #f6f8fa;
            --text: #57606a;
            --text-bright: #24292f;
            --accent: #0969da;
            --border: #d0d7de;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background-color 0.4s, color 0.4s;
        }

        /* Анимация появления */
        .fade-in {
            animation: fadeIn 1.2s cubic-bezier(0.39, 0.575, 0.565, 1) both;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Кнопка переключения темы */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text-bright);
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
            z-index: 100;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
            padding: 20px;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 20px;
            border: 2px solid var(--border);
            background-image: url('me.jpg');
            background-size: cover;
            background-position: center;
            cursor: pointer;
            transition: border-color 0.3s, transform 0.3s;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }

        .profile-img:hover {
            border-color: var(--accent);
            transform: scale(1.02);
        }

        h1 {
            color: var(--text-bright);
            font-size: 24px;
            margin: 10px 0 5px;
        }

        .description {
            font-size: 16px;
            margin-bottom: 30px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-item {
            background-color: var(--card);
            border: 1px solid var(--border);
            color: var(--text-bright);
            text-decoration: none;
            padding: 14px;
            border-radius: 10px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .link-item:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            background-color: var(--bg);
        }

        #fileInput { display: none; }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌓 Тема</button>

    <div class="container fade-in">
        <div class="profile-img" id="avatar" onclick="triggerUpload()" title="Изменить фото"></div>
        <input type="file" id="fileInput" accept="image/*" onchange="updatePhoto(event)">

        <h1>Ксюша</h1>
        <p class="description">Digital Creator & Developer</p>

        <div class="links">
            <a href="https://t.me/Kikimoriza02" class="link-item">Telegram</a>
            <a href="https://vk.ru/id578113961" class="link-item">ВКонтакте</a>
        </div>
    </div>

    <script>
        // Состояние темы и фото при загрузке
        window.onload = () => {
            // Загружаем фото
            const savedPhoto = localStorage.getItem('userAvatar');
            if (savedPhoto) document.getElementById('avatar').style.backgroundImage = `url(${savedPhoto})`;

            // Загружаем тему
            if (localStorage.getItem('theme') === 'light') {
                document.body.classList.add('light-theme');
            }
        };

        // Переключение темы
        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            const isLight = document.body.classList.contains('light-theme');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            
            // Вибрация (если поддерживается телефоном)
            if (navigator.vibrate) navigator.vibrate(40);
        }

        // Логика фото
        function triggerUpload() { document.getElementById('fileInput').click(); }

        function updatePhoto(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const result = e.target.result;
                    document.getElementById('avatar').style.backgroundImage = `url(${result})`;
                    localStorage.setItem('userAvatar', result);
                };
                reader.readAsDataURL(file);
            }
        }
    </script>
</body>
</html>
