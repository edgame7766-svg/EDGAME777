<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя страница</title>
    <style>
        /* Переменные для цветов, чтобы легко менять тему */
        :root {
            --bg: #121212;
            --text: white;
            --card: #222;
            --border: #444;
        }

        .light-theme {
            --bg: #f0f0f0;
            --text: #121212;
            --card: #fff;
            --border: #ccc;
        }

        body { 
            font-family: sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            padding: 20px;
            transition: 0.3s; /* Плавный переход цвета */
        }

        .theme-toggle {
            align-self: flex-end;
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .container { width: 100%; max-width: 400px; text-align: center; }
        
        .profile-img { 
            width: 100px; height: 100px; 
            background: linear-gradient(45deg, #00dbde, #fc00ff); 
            border-radius: 50%; margin: 0 auto 15px; 
        }

        .link-btn { 
            display: block; background: var(--card); color: var(--text); 
            text-decoration: none; padding: 18px; margin-bottom: 12px; 
            border-radius: 15px; font-size: 18px; font-weight: bold; 
            border: 2px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .link-btn:active { transform: scale(0.95); opacity: 0.8; }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()">🌓 Сменить тему</button>

    <div class="container">
        <div class="profile-img"></div>
        <h1 id="name">Ксюша</h1>
        <p>Тестовая страничка сайта</p>

        <a href="https://t.me/Kikimoriza02" class="link-btn" onclick="vib(40)">Мой Telegram</a>
        <a href="https://vk.ru/id578113961" class="link-btn" onclick="vib(40)">Мой VK</a>
    </div>

<script>
    function vib(ms) {
        if (navigator.vibrate) navigator.vibrate(ms);
    }

    function toggleTheme() {
        vib(60);
        document.body.classList.toggle('light-theme');
    }
</script>

</body>
</html>
